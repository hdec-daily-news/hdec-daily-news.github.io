name: Daily News Update

on:
  schedule:
    # 실제 오전 5:30 KST (UTC 20:30) — 지연 감안 2시간 앞당김
    - cron: '30 20 * * *'
    # 실제 오전 11:00 KST (UTC 02:00) — 지연 감안 2시간 앞당김
    - cron: '0 2 * * *'
  workflow_dispatch: # 수동 실행도 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news collector
        run: python auto_news.py

      - name: Copy to index.html
        run: cp news_top10.html index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html news_top10.html 현대건설_뉴스_종합.csv
          git diff --staged --quiet || git commit -m "Daily news update $(date +%Y-%m-%d)"
          git push
